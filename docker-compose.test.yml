# Test-only data plane + test runner. Everything talks over the internal
# docker network — no host ports needed, no port conflicts possible.
#
# Run integration tests:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: agentradar-postgres-test
    environment:
      POSTGRES_DB: agentradar
      POSTGRES_USER: agentradar
      POSTGRES_PASSWORD: agentradar_dev
    # NO ports section — test-runner reaches this via docker network
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentradar -d agentradar"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j-test:
    image: neo4j:5.20-community
    container_name: agentradar-neo4j-test
    environment:
      NEO4J_AUTH: neo4j/agentradar_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    # NO ports section
    volumes:
      - neo4j_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-neo4j-test:
    image: neo4j:5.20-community
    container_name: agentradar-init-neo4j-test
    depends_on:
      neo4j-test:
        condition: service_healthy
    volumes:
      - ./infra/neo4j/init:/cypher:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "[init-neo4j-test] applying schema..."
        for f in /cypher/*.cypher; do
          echo "[init-neo4j-test]   running $$f"
          cypher-shell -a bolt://neo4j-test:7687 -u neo4j -p agentradar_dev -f "$$f" || exit 1
        done
        echo "[init-neo4j-test] done."

  minio-test:
    image: minio/minio:latest
    container_name: agentradar-minio-test
    environment:
      MINIO_ROOT_USER: agentradar
      MINIO_ROOT_PASSWORD: agentradar_dev
    volumes:
      - minio_test_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-minio-test:
    image: minio/mc:latest
    container_name: agentradar-init-minio-test
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio-test:9000 agentradar agentradar_dev
        mc mb --ignore-existing local/agentradar-artifacts
        echo "[init-minio-test] bucket created"

  api-test:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: agentradar-api-test
    depends_on:
      postgres-test:
        condition: service_healthy
      neo4j-test:
        condition: service_healthy
      init-neo4j-test:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: postgresql://agentradar:agentradar_dev@postgres-test:5432/agentradar
      NEO4J_URI: bolt://neo4j-test:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agentradar_dev
      S3_ENDPOINT_URL: http://minio-test:9000
      S3_ACCESS_KEY: agentradar
      S3_SECRET_KEY: agentradar_dev
      S3_BUCKET: agentradar-artifacts
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)
          except Exception:
            sys.exit(1)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s



  test-runner:
    build:
      context: .
      dockerfile: tests/test-runner/Dockerfile.test
    container_name: agentradar-test-runner
    depends_on:
      postgres-test:
        condition: service_healthy
      neo4j-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      init-neo4j-test:
        condition: service_completed_successfully
      init-minio-test:
        condition: service_completed_successfully
      api-test:
        condition: service_healthy
    environment:
      # Production env vars — read by agentradar_core.config.settings
      # which is what get_pg_client(), get_neo4j_client(), get_s3_client() use
      POSTGRES_DSN: postgresql://agentradar:agentradar_dev@postgres-test:5432/agentradar
      NEO4J_URI: bolt://neo4j-test:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agentradar_dev
      S3_ENDPOINT_URL: http://minio-test:9000
      S3_ACCESS_KEY: agentradar
      S3_SECRET_KEY: agentradar_dev
      S3_BUCKET: agentradar-artifacts

      # Test-runner-specific (for the new Session 2 fixtures)
      INTEGRATION_PLANE_EXTERNAL: "1"
      TEST_POSTGRES_HOST: postgres-test
      TEST_POSTGRES_PORT: "5432"
      TEST_POSTGRES_USER: agentradar
      TEST_POSTGRES_PASSWORD: agentradar_dev
      TEST_POSTGRES_DB: agentradar
      TEST_NEO4J_URI: bolt://neo4j-test:7687
      TEST_NEO4J_USER: neo4j
      TEST_NEO4J_PASSWORD: agentradar_dev
      TEST_MCP_URL: http://api-test:8000/mcp/
      TEST_MINIO_ENDPOINT: http://minio-test:9000
      TEST_MINIO_ACCESS_KEY: agentradar
      TEST_MINIO_SECRET_KEY: agentradar_dev
      TEST_MINIO_BUCKET: agentradar-artifacts
    volumes:
      - .:/app

volumes:
  postgres_test_data:
  neo4j_test_data:
  minio_test_data:
