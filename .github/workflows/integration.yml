name: Integration

on:
  push:
    branches: [main]

jobs:
  integration:
    name: Integration tests against live data plane
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install workspace
        run: uv sync --all-extras --dev

      # ----- Docker buildx + layer cache (Strategy A) -----
      # Caches the buildkit layer cache between runs, keyed on files that
      # affect the build. Cache hit = api image rebuilds in ~10s instead
      # of ~60s. Cache miss (when deps change) = full rebuild, cache
      # repopulated for next time.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile', '**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Bring up data plane
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          cp .env.example .env
          docker compose up -d postgres neo4j minio init-neo4j init-minio
          docker compose wait init-neo4j init-minio

      - name: Verify data plane is healthy
        run: |
          docker compose ps
          for i in {1..15}; do
            if docker compose exec -T postgres pg_isready -U agentradar -d agentradar > /dev/null 2>&1; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres... ($i/15)"
            sleep 2
          done
          docker compose exec -T postgres psql -U agentradar -d agentradar -c '\dt'

      - name: Start API
        run: |
          docker compose up -d api
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: uv run pytest -m integration tests/integration/ -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose down -v
