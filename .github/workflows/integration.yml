name: Integration

on:
  push:
    branches: [main]

jobs:
  integration:
    name: Integration tests in containerized test plane
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('tests/test-runner/Dockerfile', 'pyproject.toml', 'uv.lock', '**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Prepare .env (test-runner reads it via volume mount)
        run: cp .env.example .env

      - name: Run integration tests
        # 'make test-integration' brings up postgres-test, neo4j-test,
        # minio-test, api-test + their init sidecars, then runs the
        # test-runner container which executes pytest against the
        # isolated test plane.
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: make test-integration

      - name: Capture test plane logs on failure
        if: failure()
        run: |
          echo "::group::postgres-test"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs postgres-test --tail=100 || true
          echo "::endgroup::"
          echo "::group::neo4j-test"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs neo4j-test --tail=100 || true
          echo "::endgroup::"
          echo "::group::minio-test"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs minio-test --tail=100 || true
          echo "::endgroup::"
          echo "::group::api-test"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs api-test --tail=100 || true
          echo "::endgroup::"

      - name: Tear down test plane
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down -v --remove-orphans || true
