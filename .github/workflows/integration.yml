name: Integration

on:
  push:
    branches: [main]

jobs:
  integration:
    name: Integration tests against live data plane
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install workspace
        run: uv sync --all-extras --dev

      - name: Bring up data plane
        # docker compose is installed by default on ubuntu-latest runners.
        # The data plane brings up postgres, neo4j, minio + init sidecars
        # that apply schema and create the MinIO bucket.
        run: |
          cp .env.example .env
          # Bring up the actual services. Postgres applies schema via
          # its built-in /docker-entrypoint-initdb.d/ mount; the two init-*
          # sidecars are for Neo4j and MinIO only.
          docker compose up -d postgres neo4j minio init-neo4j init-minio
          # Wait for init sidecars to finish their one-shot work
          docker compose wait init-neo4j init-minio

      - name: Verify data plane is healthy
        run: |
          docker compose ps
          # Poll postgres until ready (init scripts complete before healthcheck passes)
          for i in {1..15}; do
            if docker compose exec -T postgres pg_isready -U agentradar -d agentradar > /dev/null 2>&1; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres... ($i/15)"
            sleep 2
          done
          # Sanity check — tables should exist
          docker compose exec -T postgres psql -U agentradar -d agentradar -c '\dt'

      - name: Start API
        # Supervisor isn't needed for integration tests (the test client
        # talks to MCP directly, not via the supervisor's scheduler).
        # Skipping it saves ~30 seconds of build + boot time.
        run: |
          docker compose up -d api
          # Wait for the API's healthcheck to pass
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        # The conftest SLM-mock fixture autouses for the integration suite
        # so we don't need Ollama in CI.
        run: uv run pytest -m integration tests/integration/ -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose down -v
