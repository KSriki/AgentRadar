# Pre-commit hooks: run locally before each commit.
#
# Setup once after cloning:
#   uv run pre-commit install
#
# Manual run on all files:
#   uv run pre-commit run --all-files
#
# Bypass for emergency only:
#   git commit --no-verify
#
# Scope: fast checks (lint, format, file hygiene). Slow checks like mypy
# and full test runs are CI's job, not pre-commit's. Pre-commit must stay
# under ~5 seconds or developers will start using --no-verify.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # Skip dashboard JSON files — they have their own JS/TS toolchain
        # (Vite, TypeScript) that's authoritative for their syntax checks.
        exclude: ^apps/dashboard/
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        # Ruff is Python-only by file extension, but be explicit:
        # only scan Python files outside the dashboard.
        files: \.py$
        exclude: ^apps/dashboard/
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format
        files: \.py$
        exclude: ^apps/dashboard/
