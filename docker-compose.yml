services:
  neo4j:
    image: neo4j:5.20-community
    container_name: agentradar-neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/agentradar_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p agentradar_dev 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    volumes:
      - neo4j_data:/data

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentradar-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentradar
      POSTGRES_PASSWORD: agentradar_dev
      POSTGRES_DB: agentradar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentradar -d agentradar"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Anything in /docker-entrypoint-initdb.d runs automatically on first
      # startup (i.e., when the data volume is empty).
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    container_name: agentradar-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: agentradar
      MINIO_ROOT_PASSWORD: agentradar_dev
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - minio_data:/data

  # One-shot container: applies Neo4j schema and creates MinIO bucket,
  # then exits. Healthcheck-gated on the three services above.
  # One-shot: applies Neo4j schema using the official neo4j image.
  init-neo4j:
    image: neo4j:5.20-community
    container_name: agentradar-init-neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agentradar_dev
    volumes:
      - ./infra/neo4j/init:/cypher:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "[init-neo4j] applying schema..."
        for f in /cypher/*.cypher; do
          echo "[init-neo4j]   running $$f"
          cypher-shell -a "$$NEO4J_URI" -u "$$NEO4J_USER" -p "$$NEO4J_PASSWORD" \
            --format plain --fail-fast < "$$f"
        done
        echo "[init-neo4j] done."
    restart: "no"

  # One-shot: ensures the MinIO bucket exists, using the official mc image.
  init-minio:
    image: minio/mc:latest
    container_name: agentradar-init-minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "[init-minio] configuring alias..."
        mc alias set local http://minio:9000 agentradar agentradar_dev
        echo "[init-minio] ensuring bucket 'agentradar-artifacts' exists..."
        mc mb --ignore-existing local/agentradar-artifacts
        echo "[init-minio] done."
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: agentradar-api
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      init-neo4j:
        condition: service_completed_successfully
      init-minio:
        condition: service_completed_successfully
    environment:
      # Override .env defaults to use docker-internal hostnames
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agentradar_dev
      POSTGRES_DSN: postgresql://agentradar:agentradar_dev@postgres:5432/agentradar
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: agentradar
      S3_SECRET_KEY: agentradar_dev
      S3_BUCKET: agentradar-artifacts
      AWS_REGION: us-east-1
      ENVIRONMENT: docker
      LOG_LEVEL: INFO
      # Bedrock creds — pass through from your shell or use AWS_PROFILE
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SLM_OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    # Override the Dockerfile CMD with reload enabled. uvicorn watches the
    # bind-mounted source dirs and restarts the app within ~500ms on edits.
    # Remove --reload + --reload-dir for production.
    command:
      - uvicorn
      - agentradar_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/packages
      - --reload-dir
      - /app/services/api
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./packages:/app/packages:ro
      - ./services/api:/app/services/api:ro

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: agentradar-nginx
    depends_on:
      api:
        condition: service_healthy
      dashboard:                         
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: agentradar-dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Vite reads these for HMR / build behavior. CHOKIDAR_USEPOLLING
      # is a belt-and-suspenders setting alongside the vite.config setting,
      # since chokidar reads it directly when used by other tools.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      # Bind-mount source for HMR. node_modules stays in the container
      # (anonymous volume) so the macOS<->Linux mismatch doesn't bite us.
      - ./apps/dashboard:/app
      - /app/node_modules
    healthcheck:
      # Vite serves the index.html on port 5173. node:20-alpine ships with
      # `node` but not curl/wget. Use Node's built-in http module via a
      # tiny inline check, but as separate arguments so Docker doesn't
      # mistokenize the string.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:5173/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    # No ports published — nginx is the public face. If you ever want to
    # hit Vite directly (e.g., to debug HMR), uncomment:
    # ports:
    #   - "5173:5173"


volumes:
  neo4j_data:
  postgres_data:
  minio_data: