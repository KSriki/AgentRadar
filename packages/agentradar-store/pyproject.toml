[project]
name = "agentradar-store"
version = "0.1.0"
description = "Data access layer: Neo4j, Postgres (pgvector), S3, embeddings."
requires-python = ">=3.12"
dependencies = [
    "agentradar-core",
    "neo4j>=5.23",
    "asyncpg>=0.29",
    "pgvector>=0.3",
    "boto3>=1.35",
    "aioboto3>=13.2",
    "numpy>=2.0",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentradar_store"]