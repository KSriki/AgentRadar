# AgentRadar reverse proxy.
# Single entry point on :80. In dev, /  is proxied to the Vite dev server
# (HMR over WebSocket). For production, swap this for static-bundle serving
# via a compose override.

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream dashboard_dev {
    server dashboard:5173;
}

# Required for WebSocket upgrade. nginx maps the Connection header to
# "upgrade" when the client sends an Upgrade header (HMR), or strips it
# otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 5m;

    # ---------- API: REST endpoints ------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ---------- API: MCP tool surface ----------------------------------
    location /mcp {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SSE-critical settings for fastmcp Streamable HTTP
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    # ---------- API: docs / liveness ----------------------------------
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---------- Dashboard: Vite dev server with HMR --------------------
    # WebSocket upgrade required for HMR to push code changes to the browser.
    location / {
        proxy_pass http://dashboard_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket upgrade headers — these are what make HMR work
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long timeout for long-lived dev WebSocket
        proxy_read_timeout 86400;
    }
}